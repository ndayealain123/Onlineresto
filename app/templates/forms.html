{% extends 'index.html' %}

{% load static %}
	{% block content %}

	{% if profil_form %}
	<section class="container-fluid mt-5">
	<section class="row justify-content-center">
		<section class="col-12 col-sm-6 col-md-4 ">
			<h3 class="card-title text-center mb-5 pb-2 bg-info">Create  account</h3>
		<form class="form-signin" method="POST" action="." enctype="multipart/form-data">

			{% csrf_token %}
			{{ profil_form.as_p }}
			<button class="btn btn-success" name="submit" type="submit">create</button>
			<a class="btn btn-outline-primary" href="{% url 'connect' %}">connexion</a>
		</form>
		</section>
	</section>
	</section>
	{% endif %}

	{% endblock %}
</body>
</html>
